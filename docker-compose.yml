services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horoscope_web
    env_file:
      - .env
    environment:
      DJANGO_SQLITE_PATH: /app/data/db.sqlite3
    expose:
      - "8000"
    volumes:
      - db_data:/app/data
      - static_data:/app/staticfiles
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: horoscope_nginx
    depends_on:
      - web
    expose:
      - "80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/staticfiles:ro
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: horoscope_caddy
    depends_on:
      - nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-fizikazodiaka.ru}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  db_data:
  static_data:
  caddy_data:
  caddy_config:
