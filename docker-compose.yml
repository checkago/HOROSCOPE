services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horoscope_web
    env_file:
      - .env
    environment:
      DJANGO_SQLITE_PATH: /app/data/db.sqlite3
    expose:
      - "8000"
    volumes:
      - db_data:/app/data
      - static_data:/app/staticfiles
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: horoscope_nginx
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/staticfiles:ro
    restart: unless-stopped

volumes:
  db_data:
  static_data:
