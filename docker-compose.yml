services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horoscope_web
    env_file:
      - .env
    environment:
      DJANGO_SQLITE_PATH: /app/data/db.sqlite3
    expose:
      - "8000"
    volumes:
      - db_data:/app/data
      - static_data:/app/staticfiles
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: horoscope_nginx
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-_}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
      CERTBOT_RENEW_SLEEP_SEC: ${CERTBOT_RENEW_SLEEP_SEC:-7689600}
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - static_data:/staticfiles:ro
    restart: unless-stopped

volumes:
  db_data:
  static_data:
  certbot_conf:
  certbot_www:
