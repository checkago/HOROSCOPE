<body>
    <main class="container py-4 py-md-5">
        <div class="glass p-4 p-md-5 mb-4">
            <h1 class="display-6 fw-semibold mb-2">Физика знаков и куспидов</h1>
            <p class="text-secondary mb-0">Выбери режим, затем профиль(и), и получи красиво оформленную интерпретацию.</p>
        </div>

        <section class="glass p-4 mb-4">
            <h2 class="h5 mb-3">Шаг 1. Тип запроса</h2>
            <label class="form-label" for="mode-select">Что хотите получить?</label>
            <select id="mode-select" class="form-select form-select-lg">
                <option value="">Выберите режим</option>
                <option value="characteristic">Характеристика знака/куспида</option>
                <option value="relationship">Отношения между знаками/куспидами</option>
            </select>
        </section>

        <section class="glass p-4 mb-4 hidden" id="step-2-characteristic">
            <h2 class="h5 mb-3">Шаг 2. Выбор профиля</h2>
            <label class="form-label" for="profile-select">Знак или куспид</label>
            <select id="profile-select" class="form-select form-select-lg">
                <option value="">Выберите профиль</option>
            </select>
            <button id="show-characteristic-btn" type="button" class="btn btn-neon mt-3 w-100">Показать характеристику</button>
        </section>

        <section class="glass p-4 mb-4 hidden" id="step-2-relationship">
            <h2 class="h5 mb-3">Шаг 2. Выбор пары</h2>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="source-select">Профиль 1 (источник)</label>
                    <select id="source-select" class="form-select form-select-lg">
                        <option value="">Выберите первый профиль</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="target-select">Профиль 2 (цель)</label>
                    <select id="target-select" class="form-select form-select-lg">
                        <option value="">Сначала выберите профиль 1</option>
                    </select>
                </div>
            </div>
            <button id="show-relationship-btn" type="button" class="btn btn-neon mt-3 w-100">Показать отношения</button>
        </section>

        <section class="glass p-4 hidden" id="result-card">
            <h2 id="result-title" class="h4 mb-3"></h2>
            <article id="result-content" class="result-content"></article>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
