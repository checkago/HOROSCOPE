<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title }} — Физика Зодиака</title>
    <meta name="description" content="{{ article.summary|default:article.title|truncatechars:200 }}">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{ article.title }} — Физика Зодиака">
    <meta property="og:description" content="{{ article.summary|default:article.title|truncatechars:200 }}">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ article.title }} — Физика Зодиака">
    <meta name="twitter:description" content="{{ article.summary|default:article.title|truncatechars:200 }}">
    <link rel="icon" type="image/png" href="/static/core/favicon.png">
    <link rel="apple-touch-icon" href="/static/core/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/core/styles.css">
    <style>
        .article-nav { margin-bottom: 1.5rem; }
        .article-nav a { color: #8b9eff; text-decoration: none; }
        .article-nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    {% include "core/includes/site_header.html" with nav_active="articles" %}

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <main class="container py-5">
        <div class="glass p-4 p-md-5">
            <p class="article-nav"><a href="{% url 'article_list' %}">← Все статьи</a></p>
            
            <!-- 16:9 hero image per article topic (with fallback) -->
            <div class="article-hero">
                <picture>
                    <source
                        media="(max-width: 767px)"
                        type="image/webp"
                        srcset="/static/core/images/articles/{{ article.slug }}-mobile.webp">
                    <source
                        media="(min-width: 768px)"
                        type="image/webp"
                        srcset="/static/core/images/articles/{{ article.slug }}-desktop.webp">
                    <img src="/static/core/images/articles/{{ article.slug }}.jpg"
                         onerror="this.src='/static/core/images/article-hero.jpg'; this.onerror=null;"
                         alt="{{ article.title }}"
                         class="article-hero-image"
                         loading="lazy">
                </picture>
            </div>
            
            <article id="article-html" class="result-content characteristic-view article-reading"></article>
        </div>
    </main>

    {{ article.body_markdown|json_script:"article-md-json" }}
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
    (function () {
        var el = document.getElementById("article-md-json");
        if (!el || typeof marked === "undefined") return;
        var raw = el.textContent || "";
        var md;
        try { md = JSON.parse(raw); } catch (e) { return; }
        document.getElementById("article-html").innerHTML = marked.parse(md);
    })();
    </script>
</body>
</html>
